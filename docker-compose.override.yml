services:
  backend:
    entrypoint: []  # <--- ¡BOMBA ATÓMICA! Anula el script intermedio de la cátedra
    environment:
      - APP_ENV=production
      - DB_HOST=db
    env_file:
      - .env
    volumes:
      - ./backend/app.py:/app/app.py:ro
    # Forzamos a que corra Python directamente de raíz
    command: ["python3", "-m", "flask", "run", "--host=0.0.0.0", "--port=5000", "--debug"]

  db:
    ports:
      - "5432:5432"